name: Keep Supabase Active

on:
  schedule:
    # 每 6 小时执行一次（北京时间 02:00 / 08:00 / 14:00 / 20:00）
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visit both to keep active
        env:
          SUPABASE_URL: ${{ secrets.KEEPALIVE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.KEEPALIVE_SUPABASE_ANON_KEY }}
          VERCEL_URL: ${{ secrets.KEEPALIVE_VERCEL_URL }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            curl -s -o /dev/null --max-time 15 \
              "${SUPABASE_URL%/}/rest/v1/" \
              -H "apikey: ${SUPABASE_ANON_KEY}" || true
          else
            echo "KEEPALIVE_SUPABASE_* secrets missing; skip Supabase ping"
          fi
          if [ -n "$VERCEL_URL" ]; then
            curl -s -o /dev/null --max-time 15 "$VERCEL_URL" || true
          else
            echo "KEEPALIVE_VERCEL_URL secret missing; skip Vercel ping"
          fi
